name: DenonController
options:
  bundleIdPrefix: com.ytada
  developmentLanguage: ja
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  createIntermediateGroups: true
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_HARDENED_RUNTIME: NO
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    SWIFT_STRICT_CONCURRENCY: targeted
    DEAD_CODE_STRIPPING: YES
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  DenonController:
    type: application
    platform: macOS
    sources:
      - path: DenonController
    resources:
      - path: ../DenonControllerMobile/App/en.lproj
      - path: ../DenonControllerMobile/App/ja.lproj
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ytada.DenonController
        INFOPLIST_FILE: DenonController/Info.plist
        CODE_SIGN_ENTITLEMENTS: DenonController/DenonController.entitlements
        PRODUCT_NAME: "Denon Controller"
        MACOSX_DEPLOYMENT_TARGET: "14.0"

  DenonControllerMobile:
    type: application
    platform: iOS
    sources:
      - path: DenonController/Core
      - path: DenonController/ViewModels
      - path: DenonController/Views/Shared
      - path: ../DenonControllerMobile
    resources:
      - path: ../DenonControllerMobile/Assets.xcassets
      - path: ../DenonControllerMobile/App/en.lproj
      - path: ../DenonControllerMobile/App/ja.lproj
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ytada.DenonControllerMobile
        INFOPLIST_FILE: ../DenonControllerMobile/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: ../DenonControllerMobile/App/DenonControllerMobile.entitlements
        PRODUCT_NAME: "Denon Controller"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        TARGETED_DEVICE_FAMILY: "1,2"
